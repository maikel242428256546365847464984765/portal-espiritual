<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Oráculo · Portal Espiritual</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Raleway:wght@300;400&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--gold:#d4a843;--dark:#060410;--border-gold:rgba(212,168,67,0.3);--text:#e8d5b7;--muted:#8a7a9b;}
body{background:var(--dark);color:var(--text);font-family:'Raleway',sans-serif;min-height:100vh;}
.stars{position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:0;}
.star{position:absolute;background:#fff;border-radius:50%;animation:twinkle var(--d) ease-in-out infinite alternate;}
@keyframes twinkle{from{opacity:0.05;}to{opacity:0.7;}}
.wrap{position:relative;z-index:1;max-width:480px;margin:0 auto;padding:1.5rem 1rem 3rem;display:flex;flex-direction:column;align-items:center;}
nav{width:100%;display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:0.5px solid var(--border-gold);}
.nav-logo{font-family:'Cinzel',serif;font-size:13px;letter-spacing:3px;color:var(--gold);text-decoration:none;}
.back-btn{background:none;border:0.5px solid var(--border-gold);border-radius:20px;color:var(--gold);font-size:11px;padding:5px 12px;cursor:pointer;font-family:'Raleway',sans-serif;}
.page-title{font-family:'Cinzel',serif;font-size:20px;letter-spacing:4px;color:var(--gold);text-align:center;margin-bottom:0.3rem;}
.page-sub{font-size:10px;letter-spacing:3px;color:var(--muted);text-align:center;margin-bottom:1.5rem;}
.freq-row{display:flex;gap:8px;margin-bottom:0.8rem;flex-wrap:wrap;justify-content:center;}
.freq-btn{background:rgba(255,255,255,0.04);border:0.5px solid var(--border-gold);border-radius:20px;color:#c9b07a;font-size:11px;padding:5px 12px;cursor:pointer;transition:all 0.3s;font-family:'Raleway',sans-serif;}
.freq-btn.active,.freq-btn:hover{background:rgba(212,168,67,0.15);border-color:var(--gold);color:#f0d080;}
.freq-label{font-size:10px;color:#6b5f7a;letter-spacing:2px;margin-bottom:1rem;text-align:center;}
.chat-window{width:100%;background:rgba(10,6,18,0.8);border:0.5px solid rgba(138,122,155,0.25);border-radius:16px;padding:1.25rem;min-height:200px;max-height:350px;overflow-y:auto;margin-bottom:1rem;}
.msg{margin-bottom:1rem;line-height:1.7;font-size:14px;}
.msg.oracle{color:#d4c5a9;border-left:2px solid rgba(212,168,67,0.5);padding-left:12px;}
.msg.user{color:#8a9cbf;text-align:right;font-style:italic;}
.msg-name{font-size:10px;letter-spacing:2px;text-transform:uppercase;margin-bottom:4px;opacity:0.6;}
.oracle .msg-name{color:var(--gold);}.user .msg-name{color:#5a7aaa;}
.typing{display:none;gap:5px;align-items:center;padding:8px 12px;border-left:2px solid rgba(212,168,67,0.3);margin-bottom:1rem;}
.typing.on{display:flex;}
.dot{width:6px;height:6px;background:var(--gold);border-radius:50%;animation:pd 1.2s ease-in-out infinite;}
.dot:nth-child(2){animation-delay:0.2s;}.dot:nth-child(3){animation-delay:0.4s;}
@keyframes pd{0%,80%,100%{opacity:0.2;transform:scale(0.8);}40%{opacity:1;transform:scale(1.2);}}
.input-row{display:flex;gap:8px;width:100%;}
.q-input{flex:1;background:rgba(255,255,255,0.04);border:0.5px solid rgba(138,122,155,0.35);border-radius:25px;color:var(--text);font-family:'Raleway',sans-serif;font-size:14px;padding:10px 18px;outline:none;}
.q-input::placeholder{color:#5a4e6a;}
.q-input:focus{border-color:rgba(212,168,67,0.6);}
.send-btn{width:44px;height:44px;border-radius:50%;background:rgba(212,168,67,0.15);border:0.5px solid rgba(212,168,67,0.5);color:var(--gold);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.send-btn:hover{background:rgba(212,168,67,0.3);}
.quick-qs{width:100%;margin-top:1rem;display:flex;flex-direction:column;gap:6px;}
.quick-q{background:rgba(255,255,255,0.03);border:0.5px solid rgba(138,122,155,0.2);border-radius:10px;color:var(--muted);font-size:12px;padding:8px 14px;cursor:pointer;text-align:left;font-family:'Raleway',sans-serif;transition:all 0.3s;}
.quick-q:hover{background:rgba(212,168,67,0.08);border-color:var(--border-gold);color:#c9b07a;}
.divider{width:60px;height:0.5px;background:linear-gradient(90deg,transparent,var(--border-gold),transparent);margin:1.5rem 0;}
.symbols{font-size:14px;color:rgba(212,168,67,0.25);letter-spacing:6px;}
</style>
</head>
<body>
<div class="stars" id="stars"></div>
<div class="wrap">
  <nav>
    <a class="nav-logo" href="index.html">✦ PORTAL ESPIRITUAL</a>
    <button class="back-btn" onclick="window.location.href='index.html'">← Volver</button>
  </nav>
  <div class="page-title">ORÁCULO ESPIRITUAL</div>
  <div class="page-sub">Ancient Wisdom · Sabiduría Antigua</div>
  <div class="freq-row">
    <button class="freq-btn active" onclick="setFreq(this,432,'Afinación del universo')">432 Hz</button>
    <button class="freq-btn" onclick="setFreq(this,528,'Amor y sanación')">528 Hz</button>
    <button class="freq-btn" onclick="setFreq(this,963,'Conciencia divina')">963 Hz</button>
  </div>
  <div class="freq-label" id="freqLabel">432 Hz · Afinación del universo</div>
  <div class="chat-window" id="chatWindow">
    <div class="msg oracle">
      <div class="msg-name">✦ Oráculo</div>
      <div>Soy el guardián de los textos olvidados — el Evangelio de Tomás, el Kybalión, el Corpus Hermeticum. Habla en el idioma de tu alma.</div>
    </div>
    <div class="typing" id="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
  </div>
  <div class="input-row">
    <input class="q-input" id="qInput" placeholder="Escribe tu pregunta..." maxlength="300"/>
    <button class="send-btn" onclick="askOracle()">✦</button>
  </div>
  <div class="quick-qs">
    <button class="quick-q" onclick="useQuick(this)">¿Cuál es el propósito de mi alma en esta vida?</button>
    <button class="quick-q" onclick="useQuick(this)">What message do my departed loved ones have for me?</button>
    <button class="quick-q" onclick="useQuick(this)">¿Qué vibración bloquea mi camino espiritual?</button>
  </div>
  <div class="divider"></div>
  <div class="symbols">☽ ✦ ☿ ✦ ☉</div>
</div>
<script>
const current=JSON.parse(localStorage.getItem('pe_current')||'null');
if(!current) window.location.href='index.html';
const starsBg=document.getElementById('stars');
for(let i=0;i<70;i++){const s=document.createElement('div');s.className='star';const sz=Math.random()*1.5+0.5;s.style.cssText=`width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--d:${(Math.random()*4+2).toFixed(1)}s;animation-delay:${(Math.random()*4).toFixed(1)}s`;starsBg.appendChild(s);}
function setFreq(btn,hz,desc){document.querySelectorAll('.freq-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');document.getElementById('freqLabel').textContent=hz+' Hz · '+desc;}
function useQuick(btn){document.getElementById('qInput').value=btn.textContent;askOracle();}
const chatWindow=document.getElementById('chatWindow');
const typing=document.getElementById('typing');
let history=[];
function addMsg(text,role){const div=document.createElement('div');div.className='msg '+role;const name=document.createElement('div');name.className='msg-name';name.textContent=role==='oracle'?'✦ Oráculo':'· Tú';const body=document.createElement('div');body.textContent=text;div.appendChild(name);div.appendChild(body);chatWindow.insertBefore(div,typing);chatWindow.scrollTop=chatWindow.scrollHeight;}
async function askOracle(){
  const input=document.getElementById('qInput');const q=input.value.trim();if(!q)return;
  input.value='';addMsg(q,'user');history.push({role:'user',content:q});
  typing.classList.add('on');chatWindow.scrollTop=chatWindow.scrollHeight;
  const sysP=`Eres el Oráculo del Portal Espiritual — guardián de la sabiduría antigua: El Evangelio de Tomás, el Corpus Hermeticum, El Kybalión y los 7 Principios Herméticos, El Libro de Enoc, La Cábala, La Tabla Esmeralda de Hermes Trismegisto. IDIOMA: Detecta el idioma del usuario y responde en ese mismo idioma. TONO: Poético, profundo, sabio. Máximo 4 oraciones.`;
  try{
    const gemC=history.map(m=>({role:m.role==='assistant'?'model':'user',parts:[{text:m.content}]}));
    const res=await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=AIzaSyA7D0-A-014C-KT8wp8VbetX0s9af-ZXog',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({system_instruction:{parts:[{text:sysP}]},contents:gemC})});
    const data=await res.json();
    const reply=data.candidates?.[0]?.content?.parts?.[0]?.text||'Las frecuencias se han alineado. Pregunta de nuevo.';
    history.push({role:'assistant',content:reply});typing.classList.remove('on');addMsg(reply,'oracle');
  }catch(e){typing.classList.remove('on');addMsg('Las vibraciones se interrumpieron. Respira y consulta de nuevo.','oracle');}
}
document.getElementById('qInput').addEventListener('keydown',e=>{if(e.key==='Enter')askOracle();});
</script>
</body>
</html>
