<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin · Portal Espiritual</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Raleway:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--gold:#d4a843;--purple:#9b6dff;--dark:#060410;--card:rgba(15,10,30,0.95);--border-gold:rgba(212,168,67,0.3);--border-purple:rgba(155,109,255,0.3);--text:#e8d5b7;--muted:#8a7a9b;}
body{background:var(--dark);color:var(--text);font-family:'Raleway',sans-serif;min-height:100vh;}
.stars{position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:0;}
.star{position:absolute;background:#fff;border-radius:50%;animation:twinkle var(--d) ease-in-out infinite alternate;}
@keyframes twinkle{from{opacity:0.05;}to{opacity:0.6;}}
.wrap{position:relative;z-index:1;max-width:600px;margin:0 auto;padding:1.5rem 1rem 3rem;}

nav{display:flex;justify-content:space-between;align-items:center;margin-bottom:2rem;padding-bottom:1rem;border-bottom:0.5px solid var(--border-gold);}
.nav-logo{font-family:'Cinzel',serif;font-size:14px;letter-spacing:3px;color:var(--gold);text-decoration:none;}
.back-btn{background:none;border:0.5px solid var(--border-gold);border-radius:20px;color:var(--gold);font-size:11px;letter-spacing:2px;padding:5px 14px;cursor:pointer;font-family:'Raleway',sans-serif;}

.page-title{font-family:'Cinzel',serif;font-size:20px;letter-spacing:3px;color:var(--purple);text-align:center;margin-bottom:0.3rem;}
.page-sub{font-size:10px;letter-spacing:3px;color:var(--muted);text-align:center;text-transform:uppercase;margin-bottom:2rem;}

.stats-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1.5rem;}
.stat-card{background:var(--card);border:0.5px solid var(--border-gold);border-radius:12px;padding:1rem;text-align:center;}
.stat-num{font-family:'Cinzel',serif;font-size:28px;color:var(--gold);margin-bottom:4px;}
.stat-label{font-size:10px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;}

.section-block{background:var(--card);border:0.5px solid var(--border-purple);border-radius:16px;padding:1.25rem;margin-bottom:1rem;}
.block-title{font-family:'Cinzel',serif;font-size:13px;letter-spacing:2px;color:var(--purple);margin-bottom:1rem;}

.form-row{display:flex;flex-direction:column;gap:8px;margin-bottom:1rem;}
.form-input{width:100%;background:rgba(255,255,255,0.04);border:0.5px solid rgba(138,122,155,0.35);border-radius:10px;color:var(--text);font-family:'Raleway',sans-serif;font-size:13px;padding:9px 12px;outline:none;transition:border-color 0.3s;}
.form-input:focus{border-color:var(--purple);}
.form-select{width:100%;background:rgba(6,4,16,0.9);border:0.5px solid rgba(138,122,155,0.35);border-radius:10px;color:var(--text);font-family:'Raleway',sans-serif;font-size:13px;padding:9px 12px;outline:none;}
.form-btn{width:100%;background:rgba(155,109,255,0.12);border:0.5px solid var(--border-purple);border-radius:25px;color:var(--purple);font-family:'Cinzel',serif;font-size:13px;letter-spacing:2px;padding:10px;cursor:pointer;transition:all 0.3s;}
.form-btn:hover{background:rgba(155,109,255,0.25);}
.msg{font-size:12px;text-align:center;padding:6px;border-radius:8px;margin-top:6px;display:none;}
.msg.ok{color:#2ecc71;background:rgba(46,204,113,0.08);display:block;}
.msg.err{color:#e74c3c;background:rgba(231,76,60,0.08);display:block;}

.users-list{display:flex;flex-direction:column;gap:8px;}
.user-row{background:rgba(255,255,255,0.03);border:0.5px solid rgba(138,122,155,0.2);border-radius:10px;padding:10px 12px;display:flex;align-items:center;justify-content:space-between;gap:8px;}
.user-info{flex:1;min-width:0;}
.user-name{font-size:13px;color:var(--text);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.user-email{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.user-badge{font-size:9px;letter-spacing:1px;padding:2px 8px;border-radius:10px;flex-shrink:0;}
.badge-admin{background:rgba(155,109,255,0.15);color:var(--purple);border:0.5px solid var(--border-purple);}
.badge-member{background:rgba(212,168,67,0.1);color:var(--gold);border:0.5px solid var(--border-gold);}
.del-btn{background:none;border:0.5px solid rgba(200,80,80,0.3);border-radius:8px;color:rgba(200,80,80,0.7);font-size:11px;padding:4px 10px;cursor:pointer;flex-shrink:0;font-family:'Raleway',sans-serif;transition:all 0.3s;}
.del-btn:hover{border-color:rgba(200,80,80,0.7);color:rgba(200,80,80,1);}
.del-btn:disabled{opacity:0.3;cursor:not-allowed;}

.search-input{width:100%;background:rgba(255,255,255,0.04);border:0.5px solid rgba(138,122,155,0.25);border-radius:25px;color:var(--text);font-family:'Raleway',sans-serif;font-size:13px;padding:8px 16px;outline:none;margin-bottom:10px;}
.search-input::placeholder{color:var(--muted);}
.search-input:focus{border-color:var(--border-purple);}
.empty-msg{text-align:center;color:var(--muted);font-size:12px;padding:1rem;letter-spacing:1px;}
.divider{width:60px;height:0.5px;background:linear-gradient(90deg,transparent,var(--border-gold),transparent);margin:1.5rem auto;}
.symbols{text-align:center;font-size:14px;color:rgba(212,168,67,0.2);letter-spacing:6px;}
</style>
</head>
<body>
<div class="stars" id="stars"></div>
<div class="wrap">
  <nav>
    <a class="nav-logo" href="index.html">✦ PORTAL ESPIRITUAL</a>
    <button class="back-btn" onclick="window.location.href='index.html'">← Volver</button>
  </nav>

  <div class="page-title">PANEL DE ADMIN</div>
  <div class="page-sub">Control de usuarios · User management</div>

  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-num" id="totalUsers">0</div>
      <div class="stat-label">Total usuarios</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="totalMembers">0</div>
      <div class="stat-label">Miembros</div>
    </div>
  </div>

  <!-- CREATE USER -->
  <div class="section-block">
    <div class="block-title">⚙ CREAR USUARIO</div>
    <div class="form-row">
      <input class="form-input" id="newName" type="text" placeholder="Nombre completo"/>
      <input class="form-input" id="newEmail" type="email" placeholder="Email"/>
      <input class="form-input" id="newPass" type="password" placeholder="Contraseña (min. 6)"/>
      <select class="form-select" id="newRole">
        <option value="member">✦ Miembro</option>
        <option value="admin">⚙ Administrador</option>
      </select>
    </div>
    <button class="form-btn" onclick="createUser()">+ CREAR USUARIO</button>
    <div class="msg" id="createMsg"></div>
  </div>

  <!-- USER LIST -->
  <div class="section-block">
    <div class="block-title">✦ USUARIOS REGISTRADOS</div>
    <input class="search-input" id="searchInput" placeholder="Buscar por nombre o email..." oninput="renderUsers()"/>
    <div class="users-list" id="usersList"></div>
  </div>

  <div class="divider"></div>
  <div class="symbols">☽ ✦ ⚙ ✦ ☉</div>
</div>

<script>
const starsBg=document.getElementById('stars');
for(let i=0;i<50;i++){
  const s=document.createElement('div');s.className='star';
  const sz=Math.random()*1.5+0.5;
  s.style.cssText=`width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--d:${(Math.random()*4+2).toFixed(1)}s;animation-delay:${(Math.random()*4).toFixed(1)}s`;
  starsBg.appendChild(s);
}

// Guard: only admin
const current=JSON.parse(localStorage.getItem('pe_current')||'null');
if(!current||current.role!=='admin'){window.location.href='index.html';}

function getUsers(){return JSON.parse(localStorage.getItem('pe_users')||'[]');}
function saveUsers(u){localStorage.setItem('pe_users',JSON.stringify(u));}

function updateStats(){
  const users=getUsers();
  document.getElementById('totalUsers').textContent=users.length;
  document.getElementById('totalMembers').textContent=users.filter(u=>u.role==='member').length;
}

function renderUsers(){
  const users=getUsers();
  const q=document.getElementById('searchInput').value.toLowerCase();
  const filtered=users.filter(u=>u.name.toLowerCase().includes(q)||u.email.toLowerCase().includes(q));
  const list=document.getElementById('usersList');
  if(!filtered.length){list.innerHTML='<div class="empty-msg">Sin resultados</div>';return;}
  list.innerHTML=filtered.map(u=>`
    <div class="user-row">
      <div class="user-info">
        <div class="user-name">${u.name}</div>
        <div class="user-email">${u.email}</div>
      </div>
      <span class="user-badge ${u.role==='admin'?'badge-admin':'badge-member'}">${u.role==='admin'?'ADMIN':'MIEMBRO'}</span>
      <button class="del-btn" onclick="deleteUser('${u.id}')" ${u.id==='admin'?'disabled':''}>Eliminar</button>
    </div>
  `).join('');
}

function createUser(){
  const name=document.getElementById('newName').value.trim();
  const email=document.getElementById('newEmail').value.trim();
  const pass=document.getElementById('newPass').value;
  const role=document.getElementById('newRole').value;
  const msg=document.getElementById('createMsg');
  msg.className='msg';
  if(!name||!email||pass.length<6){msg.textContent='Completa todos los campos correctamente';msg.className='msg err';return;}
  const users=getUsers();
  if(users.find(u=>u.email===email)){msg.textContent='Ese email ya existe';msg.className='msg err';return;}
  users.push({id:'u'+Date.now(),name,email,password:pass,role,created:new Date().toISOString()});
  saveUsers(users);
  msg.textContent=`✦ Usuario "${name}" creado exitosamente`;msg.className='msg ok';
  document.getElementById('newName').value='';
  document.getElementById('newEmail').value='';
  document.getElementById('newPass').value='';
  updateStats();renderUsers();
}

function deleteUser(id){
  if(!confirm('¿Eliminar este usuario?')) return;
  let users=getUsers();
  users=users.filter(u=>u.id!==id);
  saveUsers(users);updateStats();renderUsers();
}

updateStats();renderUsers();
</script>
</body>
</html>
